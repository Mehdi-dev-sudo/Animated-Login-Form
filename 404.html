<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <meta name="description" content="Page not found." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .error-page {
      text-align: center;
      max-width: 420px;
      margin: 60px auto;
      padding: 50px 36px;
      background: var(--glass);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    .error-page .code {
      font-size: 5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 4px;
    }
    .error-page .msg {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .error-page .home-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      padding: 12px 28px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 4px 16px rgba(255,0,128,0.25);
    }
    .error-page .home-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(255,0,128,0.35);
    }
  </style>
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
  </div>
  <main class="error-page">
    <p class="code">404</p>
    <p class="msg">The page you're looking for doesn't exist.</p>
    <a href="index.html" class="home-link" aria-label="Return to login page">
      <i class="fa-regular fa-arrow-left"></i> Back to Login
    </a>
  </main>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</body>
</html>
