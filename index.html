<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth — Glassmorphism UI</title>
  <meta name="description" content="A modern login & signup form with glassmorphism design." />
  <meta name="theme-color" content="#7928ca" />
  <meta property="og:title" content="Auth — Glassmorphism UI" />
  <meta property="og:description" content="Login & signup with glassmorphism, validation, and smooth animations." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
  </div>

  <noscript><div class="nojs-warning">JavaScript is required for this application.</div></noscript>

  <div class="toast-container" id="toastContainer" aria-live="polite" aria-relevant="additions removals"></div>

  <main class="card" role="main" aria-label="Authentication forms">
    <div class="card-inner">

      <!-- ===== LOGIN ===== -->
      <form class="form active" id="loginForm" novalidate autocomplete="off">
        <div class="avatar">
          <i class="fa-regular fa-user"></i>
        </div>
        <h1 class="title">Welcome Back</h1>
        <p class="subtitle">Sign in to your account</p>

        <div class="field">
          <div class="field-input">
            <input type="email" id="loginEmail" class="input" placeholder=" " required inputmode="email" maxlength="254" autocorrect="off" autocapitalize="off" spellcheck="false" />
            <label for="loginEmail">Email</label>
            <span class="icon"><i class="fa-regular fa-envelope" aria-hidden="true"></i></span>
          </div>
        </div>

        <div class="field">
          <div class="field-input">
            <input type="password" id="loginPass" class="input" placeholder=" " required maxlength="128" autocorrect="off" autocapitalize="off" spellcheck="false" />
            <label for="loginPass">Password</label>
            <span class="icon"><i class="fa-solid fa-lock" aria-hidden="true"></i></span>
            <button type="button" class="toggle-pass" data-target="loginPass" aria-label="Toggle password">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="row">
          <label class="checkbox">
            <input type="checkbox" id="remember" />
            <span class="check"></span>
            <span class="label-text">Remember me</span>
          </label>
          <a href="#" class="link">Forgot password?</a>
        </div>

        <button type="submit" class="btn">
          <span class="btn-text">Sign In</span>
          <i class="fa-solid fa-circle-notch btn-spinner"></i>
        </button>

        <p class="switch-text">
          Don't have an account? <a href="#" class="link" data-form="signup">Sign up</a>
        </p>
      </form>

      <!-- ===== SIGN UP ===== -->
      <form class="form" id="signupForm" novalidate>
        <div class="avatar">
          <i class="fa-regular fa-user-plus"></i>
        </div>
        <h1 class="title">Create Account</h1>
        <p class="subtitle">Join us today</p>

        <div class="field">
          <div class="field-input">
            <input type="text" id="signupName" class="input" placeholder=" " required maxlength="50" />
            <label for="signupName">Full Name</label>
            <span class="icon"><i class="fa-regular fa-user" aria-hidden="true"></i></span>
          </div>
        </div>

        <div class="field">
          <div class="field-input">
            <input type="email" id="signupEmail" class="input" placeholder=" " required inputmode="email" maxlength="254" autocorrect="off" autocapitalize="off" spellcheck="false" />
            <label for="signupEmail">Email</label>
            <span class="icon"><i class="fa-regular fa-envelope" aria-hidden="true"></i></span>
          </div>
        </div>

        <div class="field">
          <div class="field-input">
            <input type="password" id="signupPass" class="input" placeholder=" " required maxlength="128" autocorrect="off" autocapitalize="off" spellcheck="false" />
            <label for="signupPass">Password</label>
            <span class="icon"><i class="fa-solid fa-lock" aria-hidden="true"></i></span>
            <button type="button" class="toggle-pass" data-target="signupPass" aria-label="Toggle password">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
          <div class="strength-bar" id="strengthBar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <span class="strength-text" id="strengthText"></span>
        </div>

        <div class="field">
          <div class="field-input">
            <input type="password" id="signupConfirm" class="input" placeholder=" " required maxlength="128" autocorrect="off" autocapitalize="off" spellcheck="false" />
            <label for="signupConfirm">Confirm Password</label>
            <span class="icon"><i class="fa-solid fa-lock" aria-hidden="true"></i></span>
            <button type="button" class="toggle-pass" data-target="signupConfirm" aria-label="Toggle password">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <label class="checkbox terms">
          <input type="checkbox" id="terms" />
          <span class="check"></span>
          <span class="label-text">I agree to the <a href="terms.html" target="_blank">Terms & Conditions</a></span>
        </label>

        <button type="submit" class="btn">
          <span class="btn-text">Create Account</span>
          <i class="fa-solid fa-circle-notch btn-spinner"></i>
        </button>

        <p class="switch-text">
          Already have an account? <a href="#" class="link" data-form="login">Sign in</a>
        </p>
      </form>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
